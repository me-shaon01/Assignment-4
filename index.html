<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist', 'sans-serif'],
                    },
                },
            },
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-slate-900 transition-colors duration-300 font-sans text-gray-800 dark:text-gray-100">

    <nav class="max-w-6xl mx-auto p-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-600 dark:text-blue-400">Job Application Tracker</h1>
        <button id="theme-btn" onclick="toggleDarkMode()"
            class="p-2 bg-gray-200 dark:bg-gray-700 rounded-full transition-all duration-300">
            <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
        </button>
    </nav>

    <header class="max-w-6xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div
                class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:border-blue-200">
                <p class="text-gray-500 dark:text-gray-400 font-medium">Total</p>
                <h2 id="total-count" class="text-4xl font-bold text-blue-600">8</h2>
            </div>
            <div
                class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:border-green-200">
                <p class="text-gray-500 dark:text-gray-400 font-medium">Interview</p>
                <h2 id="interview-count" class="text-4xl font-bold text-green-500">0</h2>
            </div>
            <div
                class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:border-red-200">
                <p class="text-gray-500 dark:text-gray-400 font-medium">Rejected</p>
                <h2 id="rejected-count" class="text-4xl font-bold text-red-500">0</h2>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">Available Jobs</h2>
            <span id="tab-job-count" class="text-gray-500 font-semibold">8 jobs</span>
        </div>

        <div class="flex gap-4 mb-8">
            <button onclick="switchTab('all')" id="tab-all"
                class="px-6 py-2 rounded-lg bg-blue-600 text-white">All</button>
            <button onclick="switchTab('interview')" id="tab-interview"
                class="px-6 py-2 rounded-lg bg-gray-200 dark:bg-gray-700">Interview</button>
            <button onclick="switchTab('rejected')" id="tab-rejected"
                class="px-6 py-2 rounded-lg bg-gray-200 dark:bg-gray-700">Rejected</button>
        </div>

        <div id="job-container" class="space-y-6"></div>

        <div id="empty-state"
            class="hidden flex flex-col items-center justify-center py-20 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
            <img src="jobs.png" alt="No Jobs Found" class="w-[100px] h-[100px] object-contain mb-4">
            <h3 class="text-xl font-bold text-gray-700 dark:text-gray-200">No jobs available</h3>
            <p class="text-gray-500 dark:text-gray-400">Check back soon for new job opportunities</p>
        </div>
    </header>

    <script src="script.js"></script>
</body>

</html>
